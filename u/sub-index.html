<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>StreamHUB - Perfil</title>
  <link rel="stylesheet" href="/css/sub-style.css">
</head>
<body>
  <div class="page">
<header class="headerbar">
  <a href="/" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Volver al home</span>
  </a>

  <div class="logo">
    <span class="logo-stream">Stream</span><span class="logo-hub">HUB</span>
  </div>
</header>


    <main class="content">
      <section class="columns">
        <!-- COLUMNA IZQUIERDA -->
        <aside class="col-left">
          <div class="profile-photo-wrapper">
<img
  src="/assets/avatar-placeholder-1.png"
  alt="Foto de perfil de BillyBillete"
  class="profile-photo"
>
          </div>

          <div class="profile-username">
            <h1 class="username">@BillyBillete</h1>
            <img
              src="/assets/svg/verify.svg"
              alt="Cuenta verificada"
              class="username-check"
            >
          </div>

          <p class="profile-description">
            Descripción de perfil de ejemplo, tomada de creators.json,
            con estilo Segoe UI en cursiva delgada.
          </p>

          <p class="profile-meta">
            <span class="meta-label">Nacionalidad</span>
            <span class="meta-value" id="creator-nationality">XXXXXX</span>
            <span class="meta-flag" id="creator-nationality-flag"></span>
          </p>

          <p class="profile-meta">
            <span class="meta-label">Residencia en</span>
            <span class="meta-value" id="creator-residence">XXXXXX</span>
            <span class="meta-flag" id="creator-residence-flag"></span>
          </p>
        </aside>

        <!-- COLUMNA CENTRAL / DERECHA -->
        <section class="col-right">
          <h2 class="section-title">Tipo de contenido</h2>
          <div class="tags-container" id="creator-tags"></div>

          <h2 class="section-title">Mis juegos</h2>
          <div class="games-grid" id="creator-games"></div>
        </section>
      </section>

      <!-- Bottom section -->
      <section class="bottom-section">
        <div class="bottom-top">
          <!-- contenido superior -->
        </div>
        <div class="bottom-bottom">
          <!-- Otros streamers, carrusel, etc. -->
        </div>
      </section>
    </main>
  </div>
<script defer src="/js/rawg-api.js"></script>
<script defer src="/js/streamhub-profile.js"></script>
</body>
</html>
